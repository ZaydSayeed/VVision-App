<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join a Care Team — Vela Vision</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0F0D18;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card { max-width: 400px; width: 100%; text-align: center; }
    .logo { font-size: 28px; font-weight: 700; color: #9B8BFF; margin-bottom: 32px; letter-spacing: -0.5px; }
    h1 { font-size: 26px; font-weight: 700; line-height: 1.2; margin-bottom: 14px; }
    p { font-size: 16px; color: rgba(255,255,255,0.65); line-height: 1.6; margin-bottom: 36px; }
    .btn {
      display: inline-block; background: #7B5CE7; color: #FFFFFF;
      font-size: 16px; font-weight: 600; padding: 16px 36px;
      border-radius: 999px; text-decoration: none;
    }
    .note { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Vela Vision</div>
    <h1>You've been invited to a care team</h1>
    <p>Download the Vela app to accept your invite and start supporting your loved one's care.</p>
    <a class="btn" href="https://apps.apple.com/app/id6767374702">Download on the App Store</a>
    <p class="note">Already have the app? Open it and sign in — your invite will be waiting.</p>
  </div>
</body>
</html>
